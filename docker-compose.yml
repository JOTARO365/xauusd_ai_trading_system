services:

  postgres:
    image: postgres:16-alpine
    container_name: xauusd-postgres
    environment:
      POSTGRES_DB:       trading
      POSTGRES_USER:     trading
      POSTGRES_PASSWORD: trading
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5433:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading -d trading"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xauusd-dashboard
    ports:
      - "5050:5050"
    volumes:
      - ./.env:/app/.env:ro
      - ./logs:/app/logs
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: "postgresql://trading:trading@postgres:5432/trading"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  adminer:
    image: adminer
    container_name: xauusd-adminer
    ports:
      - "8300:8080"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:

# ─────────────────────────────────────────────────────────────
# Trading Bot (main.py) ต้องรันบน Windows host
# เพราะ MetaTrader5 Python API ใช้ Windows IPC เชื่อมต่อ MT5 terminal
#
# รันผ่าน start.bat  (แนะนำ — จัดการทุกอย่างอัตโนมัติ)
# หรือรันตรงๆ:  python main.py
#
# ถ้าต้องการ 100% Docker ให้ใช้ Windows containers:
#   docker compose -f docker-compose.windows.yml up -d
# ─────────────────────────────────────────────────────────────
